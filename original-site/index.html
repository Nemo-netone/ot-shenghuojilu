<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>旅行生活记录</title><link rel="stylesheet" href="styles.css"></head><body><header><b>旅行生活记录</b><nav>首页　分类浏览　服务中心</nav><button id="loginOpen">管理登录</button></header><main id="public"><section class="hero"><div><small>ORIGINAL FRONTEND RECOVERY</small><h1>旅行生活记录</h1><p>城市、景点与旅行故事</p><button id="browse">浏览核心列表</button></div><div class="visual"><span>游记管理</span></div></section><section><h2>精选内容</h2><div id="cards" class="cards"></div></section></main><dialog id="login"><form id="loginForm"><button type="button" id="close">×</button><h2>登录旅行生活记录</h2><select name="role"><option value="admin">管理员</option><option value="user">普通用户</option><option value="staff">运营人员</option></select><input name="username" value="admin"><input name="password" type="password" value="admin"><button>登录</button><p id="msg"></p></form></dialog><div id="app" hidden><aside><h2>旅行生活记录</h2><a>控制台</a><a class="active">游记管理</a><a>用户管理</a><a>系统设置</a><button id="logout">退出</button></aside><article><div class="toolbar"><h1>游记管理</h1><button id="add">新增记录</button></div><div class="stats"><b id="count">0</b><span>当前记录</span></div><table><thead><tr><th>名称</th><th>副标题</th><th>状态</th><th>金额/数量</th><th>操作</th></tr></thead><tbody id="rows"></tbody></table></article></div><dialog id="editor"><form id="editForm"><button type="button" id="editClose">×</button><input type="hidden" name="id"><input type="hidden" name="module_key" value="travel"><input name="title" placeholder="名称" required><input name="subtitle" placeholder="副标题"><input name="status" value="正常"><input name="amount" type="number" value="0"><textarea name="description" placeholder="说明"></textarea><button>保存</button></form></dialog><script src="app.js"></script></body></html>
